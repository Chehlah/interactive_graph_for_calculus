<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Graphs</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d8dee9;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .tabs {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 8px;
        align-items: center;
        width: 100%;
        padding: 12px clamp(12px, 3vw, 28px);
        overflow-x: auto;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(14px);
      }

      .tab {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-weight: 750;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }

      .tab:hover {
        border-color: #93c5fd;
        background: var(--accent-soft);
      }

      .tab.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .home {
        width: min(1040px, calc(100% - 32px));
        margin: 32px auto;
      }

      .home-panel {
        padding: clamp(20px, 4vw, 34px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.65rem, 4vw, 2.6rem);
        line-height: 1.15;
      }

      .intro {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .graph-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 24px;
      }

      .graph-link {
        min-height: 112px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
        text-align: left;
        cursor: pointer;
      }

      .graph-link strong {
        display: block;
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 1rem;
      }

      .graph-link span {
        color: var(--text);
        font-weight: 800;
        line-height: 1.35;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 65px);
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 640px) {
        .tabs {
          padding: 10px;
        }

        .tab {
          padding: 9px 12px;
          font-size: 0.92rem;
        }

        iframe {
          height: calc(100vh - 58px);
        }
      }
    </style>
  </head>
  <body>
    <nav class="tabs" aria-label="เลือกหน้า">
      <button class="tab active" type="button" data-page="home">Home</button>
      <button class="tab" type="button" data-page="graph1">f(x) = 2x³ − 5x² + 4x − 7</button>
      <button class="tab" type="button" data-page="graph2">f(x) = x³ − 3x² + 2x</button>
      <button class="tab" type="button" data-page="graph3">f(x) = x² + 5x + 6</button>
    </nav>

    <main>
      <section class="view active" id="home">
        <div class="home">
          <div class="home-panel">
            <h1>Interactive Graphs</h1>
            <p class="intro">
              เลือกแท็บด้านบนเพื่อเปิดกราฟ Interactive แต่ละฟังก์ชัน
              หรือกดจากรายการด้านล่างเพื่อไปยังหน้ากราฟที่ต้องการ
            </p>

            <div class="graph-links">
              <button class="graph-link" type="button" data-page="graph1">
                <strong>หน้า 1</strong>
                <span>f(x) = 2x³ − 5x² + 4x − 7</span>
              </button>
              <button class="graph-link" type="button" data-page="graph2">
                <strong>หน้า 2</strong>
                <span>f(x) = x³ − 3x² + 2x</span>
              </button>
              <button class="graph-link" type="button" data-page="graph3">
                <strong>หน้า 3</strong>
                <span>f(x) = x² + 5x + 6</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="view" id="graph1">
        <iframe src="interactive_graph_1.html" title="f(x) = 2x³ − 5x² + 4x − 7"></iframe>
      </section>

      <section class="view" id="graph2">
        <iframe src="interactive_graph_2.html" title="f(x) = x³ − 3x² + 2x"></iframe>
      </section>

      <section class="view" id="graph3">
        <iframe src="interactive_graph_3.html" title="f(x) = x² + 5x + 6"></iframe>
      </section>
    </main>

    <script>
      const buttons = document.querySelectorAll("[data-page]");
      const tabButtons = document.querySelectorAll(".tab");
      const views = document.querySelectorAll(".view");

      function showPage(pageId) {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.page === pageId);
        });

        views.forEach((view) => {
          view.classList.toggle("active", view.id === pageId);
        });
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => showPage(button.dataset.page));
      });
    </script>
  </body>
</html>
